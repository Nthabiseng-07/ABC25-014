<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Urban Street Apparels | Share Your Experience</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body>
    <h1 class="logo">URBAN STREET APPARELS</h1>

   <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="shop.html">Shop</a>
        <a href="contact.html">Contact</a>
        <a href="feedback.html">Feedback</a>
      </nav>
  
  <div class="feedback-container">
    <h2 class="feedback-title">We'd Love Your Feedback!</h2>
    <p class="feedback-subtitle">Help us improve by sharing your thoughts and experiences</p>
    
    <div class="feedback-form-wrapper">
      <form class="feedback-form">
        <div class="form-group">
          <label for="name">Full Name *</label>
          <input type="text" id="name" name="name" required placeholder="Enter your full name">
        </div>

        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" required placeholder="Enter your email">
        </div>

        <div class="form-group">
          <label for="rating">Rating *</label>
          <select id="rating" name="rating" required>
            <option value="">Select a rating</option>
            <option value="5">5 - Excellent!</option>
            <option value="4">4 - Very Good</option>
            <option value="3">3 - Good</option>
            <option value="2">2 - Fair</option>
            <option value="1">1 - Needs Improvement</option>
          </select>
        </div>

        <div class="form-group">
          <label for="category">Feedback Category *</label>
          <select id="category" name="category" required>
            <option value="">Select a category</option>
            <option value="product">Product Quality</option>
            <option value="service">Customer Service</option>
            <option value="shipping">Shipping Experience</option>
            <option value="website">Website Experience</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Your Feedback *</label>
          <textarea id="message" name="message" required placeholder="Tell us what you think..."></textarea>
        </div>

        <button type="submit" class="feedback-submit-btn">Submit Feedback</button>
      </form>
    </div>

    <div class="feedback-info">
      <h3>Why Your Feedback Matters</h3>
      <div class="feedback-benefits">
        <div class="benefit-item">
          <span class="benefit-icon">✓</span>
          <p>Help us improve our products and services</p>
        </div>
        <div class="benefit-item">
          <span class="benefit-icon">✓</span>
          <p>Share your unique urban style insights</p>
        </div>
        <div class="benefit-item">
          <span class="benefit-icon">✓</span>
          <p>Be part of our growing community</p>
        </div>
      </div>
    </div>
  </div>
  </body>
</html>
